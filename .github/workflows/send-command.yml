name: Send Command to Amosclaud Engine

on:
  workflow_dispatch:
    inputs:
      action:
        description: What Amosclaud should do
        required: true
        type: choice
        options: [inspect, fix, verify, monitor]
      target_repository:
        description: Approved repository target
        required: true
        type: choice
        options:
          - wamakologeorge-dev/amosclaude-clean
          - wamakologeorge-dev/workspace
          - wamakologeorge-dev/starter-workflows
          - wamakologeorge-dev/Amosclaud1
      objective:
        description: Describe the engineering task
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate command
        env:
          OBJECTIVE: ${{ inputs.objective }}
        run: |
          set -euo pipefail
          test -n "$OBJECTIVE"
          test "${#OBJECTIVE}" -le 1000

      - name: Create request identity
        id: request
        run: echo "id=dashboard-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Create Command Center record
        id: command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION: ${{ inputs.action }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          OBJECTIVE: ${{ inputs.objective }}
          REQUEST_ID: ${{ steps.request.outputs.id }}
        run: |
          set -euo pipefail
          cat > /tmp/command.md <<EOF
          ## Amosclaud Command

          - **Request ID:** \`$REQUEST_ID\`
          - **Action:** \`$ACTION\`
          - **Target:** \`$TARGET_REPOSITORY\`
          - **Objective:** $OBJECTIVE
          - **Status:** QUEUED

          ### Progress

          - [x] Command created in Amosclaud1
          - [ ] Authorized by the engine
          - [ ] Execution started
          - [ ] Result returned

          This issue is the single Command Center record for the request. The engine will update this same issue as work progresses.
          EOF

          issue_url="$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "Amosclaud: ${ACTION} ${TARGET_REPOSITORY} [${REQUEST_ID}]" \
            --body-file /tmp/command.md)"
          issue_number="${issue_url##*/}"
          echo "number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "url=$issue_url" >> "$GITHUB_OUTPUT"

      - name: Send command to amosclaude-clean
        env:
          GH_TOKEN: ${{ secrets.AMOSCLAUD_ENGINE_TOKEN }}
          ACTION: ${{ inputs.action }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          OBJECTIVE: ${{ inputs.objective }}
          REQUEST_ID: ${{ steps.request.outputs.id }}
          COMMAND_ISSUE: ${{ steps.command.outputs.number }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN" || {
            echo "AMOSCLAUD_ENGINE_TOKEN is not configured." >&2
            exit 1
          }
          jq -n \
            --arg ref main \
            --arg source_repository "${{ github.repository }}" \
            --arg action "$ACTION" \
            --arg target_repository "$TARGET_REPOSITORY" \
            --arg objective "$OBJECTIVE" \
            --arg request_id "$REQUEST_ID" \
            --arg command_issue "$COMMAND_ISSUE" \
            '{ref:$ref, inputs:{source_repository:$source_repository, action:$action, target_repository:$target_repository, objective:$objective, request_id:$request_id, command_issue:$command_issue}}' \
            > /tmp/dispatch.json
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/wamakologeorge-dev/amosclaude-clean/actions/workflows/command-center-receiver.yml/dispatches \
            --input /tmp/dispatch.json

      - name: Publish command summary
        run: |
          {
            echo "# Command sent to Amosclaud"
            echo
            echo "- Request: \`${{ steps.request.outputs.id }}\`"
            echo "- Command record: ${{ steps.command.outputs.url }}"
            echo "- Action: \`${{ inputs.action }}\`"
            echo "- Target: \`${{ inputs.target_repository }}\`"
            echo "- Objective: ${{ inputs.objective }}"
            echo
            echo "The engine will update the same Amosclaud1 issue with authorization, progress, and the final result."
          } >> "$GITHUB_STEP_SUMMARY"
